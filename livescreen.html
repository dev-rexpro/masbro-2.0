<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff" id="themeColorMeta">
    <title>AI Live Conversation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --app-bg-light: #ffffff;
            --app-text-light: #000000;
            --app-bg-dark: #000000;
            --app-text-dark: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100dvh; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .main-stage {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .orb-wrapper {
            position: absolute;
            z-index: 40;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .orb-wrapper.state-voice {
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; 
            height: 220px;
        }

        /* Posisi tepat di atas card saat mode video */
        .orb-wrapper.state-video {
            top: 55px; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0.35);
            width: 220px;
            height: 220px;
            z-index: 50;
        }

        .orb-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: filter 0.15s ease, transform 0.1s ease-out;
        }

        .orb-inner::before {
            content: "";
            position: absolute; 
            inset: -30px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, rgba(99,102,241,var(--glow, 0.35)), rgba(99,102,241,0) 70%);
            filter: blur(20px);
            z-index: 0;
            transition: opacity 0.1s linear;
        }

        canvas {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 50%;
            display: block;
            z-index: 1;
            box-shadow: 
                0 20px 60px -10px rgba(80,90,220,0.45),
                inset 0 0 30px rgba(255,255,255,0.15);
        }

        .highlight {
            position: absolute;
            top: 6%; left: 12%;
            width: 55%; height: 35%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0) 70%);
            filter: blur(6px);
            pointer-events: none;
            z-index: 2;
        }

        .video-container {
            position: absolute;
            top: 110px; 
            bottom: 110px; 
            left: 20px; right: 20px;
            border-radius: 32px;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            z-index: 10;
            background-color: #111;
        }

        .video-container.active {
            opacity: 1; transform: scale(1); pointer-events: auto;
        }

        .video-container img {
            width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85);
        }

        .video-overlays {
            position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 25px 20px; z-index: 20;
        }

        .disclaimer-text {
            color: rgba(255, 255, 255, 0.85); font-size: 0.75rem; text-align: center; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .live-subtitles {
            color: white; font-size: 1.15rem; font-weight: 500; text-align: center; line-height: 1.5; padding: 0 15px; text-shadow: 0 2px 6px rgba(0,0,0,0.8);
            min-height: 3.5rem; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 55px;
        }

        .video-action-btns {
            position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 30;
        }
        .video-action-btns button {
            color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.4); width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.1rem; cursor: pointer; backdrop-filter: blur(8px);
        }

        .bottom-controls {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; padding-bottom: calc(30px + var(--sab)); display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 50;
        }

        .btn-circle {
            width: 58px; height: 58px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 1.25rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .btn-circle:active { transform: scale(0.9); }

        html:not(.dark) { background-color: var(--app-bg-light); color: var(--app-text-light); }
        html:not(.dark) .btn-control-base { background-color: #f0f0f0; color: #000; }
        
        html.dark { background-color: var(--app-bg-dark); color: var(--app-text-dark); }
        html.dark .btn-control-base { background-color: rgba(255, 255, 255, 0.15); color: white; }

        .btn-primary { background-color: white; color: black; }
        html:not(.dark) .btn-primary { background-color: #000; color: white; }
        
        .btn-primary.muted { background-color: #ef4444 !important; color: white !important; }

        .btn-video-active { background-color: white !important; color: black !important; }
        html:not(.dark) .btn-video-active { background-color: black !important; color: white !important; }

    </style>
</head>
<body class="antialiased selection:bg-blue-300">

    <div class="app-container">
        
        <div class="main-stage">
            
            <div class="orb-wrapper state-voice" id="orbWrapper">
                <div class="orb-inner" id="orbInner">
                    <canvas id="glcanvas"></canvas>
                    <div class="highlight"></div>
                </div>
            </div>

            <div class="video-container" id="videoContainer">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Camera Feed">
                <div class="video-overlays">
                    <div class="disclaimer-text">
                        Don't use for live navigation or decisions that<br>may impact your health or safety.
                    </div>
                    <div class="video-action-btns">
                        <button title="Turn off camera"><i class="fa-solid fa-microphone-lines-slash" style="font-size: 0.9rem;"></i></button>
                        <button title="Switch camera"><i class="fa-solid fa-rotate"></i></button>
                    </div>
                    <div class="live-subtitles" id="subtitles"></div>
                </div>
            </div>

        </div>

        <div class="bottom-controls">
            <button class="btn-circle btn-control-base" id="toggleVideoBtn" title="Toggle Video Mode">
                <i class="fa-solid fa-video"></i>
            </button>
            <button class="btn-circle btn-primary" id="micBtn" title="Mute/Unmute">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <button class="btn-circle btn-control-base" title="Share Screen">
                 <i class="fa-solid fa-display"></i>
            </button>
            <button class="btn-circle btn-control-base" title="End Conversation">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
    </div>

    <script>
        const toggleVideoBtn = document.getElementById('toggleVideoBtn');
        const orbWrapper = document.getElementById('orbWrapper');
        const orbInner = document.getElementById('orbInner');
        const videoContainer = document.getElementById('videoContainer');
        const subtitlesEl = document.getElementById('subtitles');
        const micBtn = document.getElementById('micBtn');
        
        let isVideoMode = false;
        let isMuted = true; 
        
        const scriptLines = [
            "All right, from the looks of it, you've got a bowl with",
            "...with some cottage cheese and a mix of fruit",
            "...like melon, pineapple, blueberries in there.",
            "Cottage cheese is the protein powerhouse here."
        ];
        let subtitleInterval;
        
        toggleVideoBtn.addEventListener('click', () => {
            isVideoMode = !isVideoMode;
            if (isVideoMode) {
                orbWrapper.classList.replace('state-voice', 'state-video');
                videoContainer.classList.add('active');
                toggleVideoBtn.classList.replace('btn-control-base', 'btn-video-active');
                
                let cur = 0; subtitlesEl.innerText = "";
                setTimeout(() => {
                    if(!isVideoMode) return;
                    subtitlesEl.innerText = scriptLines[cur];
                    subtitleInterval = setInterval(() => {
                        cur++;
                        if (cur < scriptLines.length) subtitlesEl.innerText = scriptLines[cur];
                        else { clearInterval(subtitleInterval); setTimeout(() => subtitlesEl.innerText = "", 2000); }
                    }, 2200);
                }, 800);
            } else {
                orbWrapper.classList.replace('state-video', 'state-voice');
                videoContainer.classList.remove('active');
                toggleVideoBtn.classList.replace('btn-video-active', 'btn-control-base');
                clearInterval(subtitleInterval); subtitlesEl.innerText = "";
            }
        });


        const canvas = document.getElementById('glcanvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        if(!gl) console.error('WebGL not supported');

        function resize() {
            const size = 300; 
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resize();
        window.addEventListener('resize', resize);

        const vertSrc = `
        attribute vec2 aPos;
        void main(){ gl_Position = vec4(aPos, 0.0, 1.0); }
        `;

        const fragSrc = `
        precision highp float;
        uniform float uTime;
        uniform vec2 uResolution;
        uniform float uAudio;      // smoothed 0..1
        uniform float uAudioPunch; // fast-attack transient 0..1

        float hash(vec2 p){
          return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453123);
        }

        float noise(vec2 p){
          vec2 i = floor(p);
          vec2 f = fract(p);
          float a = hash(i);
          float b = hash(i + vec2(1.0,0.0));
          float c = hash(i + vec2(0.0,1.0));
          float d = hash(i + vec2(1.0,1.0));
          vec2 u = f*f*(3.0-2.0*f);
          return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
        }

        float fbm(vec2 p){
          float v = 0.0;
          float amp = 0.5;
          for(int i=0;i<6;i++){
            v += amp * noise(p);
            p *= 2.02;
            amp *= 0.5;
          }
          return v;
        }

        void main(){
          vec2 uv = gl_FragCoord.xy / uResolution.xy;
          vec2 p = uv - 0.5;
          float dist = length(p);
          float radius = 0.478;
          float edge = smoothstep(radius, radius - 0.012, dist);
          if(edge <= 0.001){ discard; }

          float x = uv.x;
          float speed = 0.045 + uAudio * 0.22;
          float t = uTime * speed;

          // --- soft undulating boundary between the indigo top and white base ---
          float n1 = fbm(vec2(x*1.15 + t*0.7, t*0.35));
          float n2 = fbm(vec2(x*2.3  - t*0.5, t*0.55 + 4.0));
          float voiceWave = uAudioPunch * 0.05 * sin(x*13.0 + t*9.0 + n1*4.0);

          float boundary = 0.47
            + (n1-0.5) * (0.30 + uAudio*0.22)
            + (n2-0.5) * (0.13 + uAudio*0.18)
            + voiceWave;

          float distToBoundary = uv.y - boundary;

          float softWidth = 0.12 + 0.06*fbm(vec2(x*2.4+10.0, t*0.6)) + uAudio*0.05;
          float mixv = smoothstep(-softWidth, softWidth, distToBoundary);

          vec3 colTop    = vec3(0.36, 0.41, 0.95);
          vec3 colBottom = vec3(1.0, 1.0, 1.0);
          vec3 base = mix(colBottom, colTop, mixv);

          // thin wispy strands
          float wispN = fbm(vec2(x*6.0 + t*1.2, uv.y*6.0 - t*0.9));
          float proximity = exp(-pow(distToBoundary / (softWidth*1.7), 2.0));
          float wisp = (wispN-0.5) * proximity * (0.32 + uAudio*0.55 + uAudioPunch*0.4);
          base += wisp;

          float cloudShade = fbm(vec2(x*1.6+30.0, uv.y*1.4 + t*0.2));
          base += (cloudShade-0.5) * 0.05 * mixv;

          float glassLight = smoothstep(0.9,0.0,length(p - vec2(-0.14,0.16)))*0.16;
          base += glassLight;

          base += uAudioPunch * 0.08;
          base += uAudio * 0.02;

          gl_FragColor = vec4(base, edge);
        }
        `;

        function compile(type, src){
            const sh = gl.createShader(type);
            gl.shaderSource(sh, src);
            gl.compileShader(sh);
            return sh;
        }

        const prog = gl.createProgram();
        gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
        gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
        gl.linkProgram(prog);

        const verts = new Float32Array([-1,-1, 3,-1, -1,3]);
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
        const aPos = gl.getAttribLocation(prog, 'aPos');
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        const uTime = gl.getUniformLocation(prog, 'uTime');
        const uResolution = gl.getUniformLocation(prog, 'uResolution');
        const uAudio = gl.getUniformLocation(prog, 'uAudio');
        const uAudioPunch = gl.getUniformLocation(prog, 'uAudioPunch');

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        let audioLevel = 0;
        let audioPunch = 0;
        let targetLevel = 0;
        let analyser = null;
        let dataArray = null;
        let micActive = false;
        let audioCtx = null;

        async function toggleMic(){
            if(micActive){
                micActive = false;
                micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                micBtn.classList.add('muted');
                if(audioCtx){ audioCtx.close(); audioCtx = null; }
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.6;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                source.connect(analyser);

                micActive = true;
                micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                micBtn.classList.remove('muted');
            } catch(err) {
                console.error("Mic Error:", err);
                alert("Mohon izinkan akses mikrofon untuk interaksi awan.");
            }
        }
        
        micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
        micBtn.classList.add('muted');
        
        micBtn.addEventListener('click', toggleMic);
        orbWrapper.addEventListener('click', () => { if(!micActive) toggleMic(); });

        function readAudio(){
            if(!micActive || !analyser) return 0;
            analyser.getByteTimeDomainData(dataArray);
            let sumSquares = 0;
            for(let i=0; i<dataArray.length; i++){
                const v = (dataArray[i] - 128) / 128;
                sumSquares += v*v;
            }
            const rms = Math.sqrt(sumSquares / dataArray.length);
            return Math.min(1, rms * 4.5); 
        }

        const start = performance.now();

        function frame(now){
            const t = (now - start) / 1000;

            const raw = readAudio();
            targetLevel = raw;
            audioLevel += (targetLevel - audioLevel) * 0.12;
            const punchTarget = Math.max(0, raw - audioLevel*0.6);
            audioPunch += (punchTarget - audioPunch) * 0.35;

            gl.useProgram(prog);
            gl.uniform1f(uTime, t);
            gl.uniform2f(uResolution, canvas.width, canvas.height);
            gl.uniform1f(uAudio, audioLevel);
            gl.uniform1f(uAudioPunch, audioPunch);

            gl.clearColor(0,0,0,0);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArrays(gl.TRIANGLES, 0, 3);

            const scale = 1 + audioLevel * 0.05 + audioPunch * 0.03;
            orbInner.style.transform = `scale(${scale})`;
            orbInner.style.setProperty('--glow', (0.35 + audioLevel*0.5).toFixed(3));

            requestAnimationFrame(frame);
        }
        if(gl) requestAnimationFrame(frame);

    </script>
</body>
</html>
